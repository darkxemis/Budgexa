<div class="budgets-container">
  <div class="page-header">
    <h1 class="page-title">{{ 'budgets.title' | translate }}</h1>

    <button
      type="button"
      class="btn btn-primary create-btn"
      (click)="openCreate()"
    >
      <app-icon name="plus" [size]="16" />
      <span>{{ 'budgets.create' | translate }}</span>
    </button>
  </div>

  <main class="budgets-main">
    <div class="budgets-grid">
      <app-data-grid
        [columns]="columns"
        [actions]="actions"
        [loading]="loading()"
        [defaultPageSize]="10"
        [pageSizeOptions]="[10, 25, 50, 100]"
        [showSearch]="true"
        [showPagination]="true"
        (gridStateChange)="onGridStateChange($event)"
      ></app-data-grid>
    </div>
  </main>

  @if (formModalOpen()) {
    <app-budget-form-modal
      [mode]="formMode()"
      [budgetId]="editingBudgetId()"
      (saved)="onFormSaved()"
      (close)="onFormClosed()"
    />
  }

  @if (deleteDialogOpen()) {
    <app-confirm-dialog
      title="budgets.delete.title"
      message="budgets.delete.message"
      [messageParams]="deleteMessageParams()"
      confirmLabel="delete"
      cancelLabel="cancel"
      variant="danger"
      [loading]="deleting()"
      (confirm)="confirmDelete()"
      (cancel)="cancelDelete()"
    />
  }
</div>
