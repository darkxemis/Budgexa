<div class="users-container">
  <div class="page-header">
    <h1 class="page-title">{{ 'users.title' | translate }}</h1>
  </div>
  
  <main class="users-main">
    <div class="users-grid">
      <app-data-grid
        [columns]="columns"
        [loading]="loading()"
        [defaultPageSize]="25"
        [pageSizeOptions]="[10, 25, 50, 100]"
        [showSearch]="true"
        [showPagination]="true"
        (gridStateChange)="onGridStateChange($event)"
      ></app-data-grid>
    </div>
  </main>
</div>
