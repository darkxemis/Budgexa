<div class="autocomplete-selector">
  <div class="autocomplete-input-wrapper">
    <input
      #searchInput
      type="text"
      [value]="searchText()"
      (input)="onInput($any($event.target).value)"
      (focus)="onFocus()"
      (keydown)="onKeyDown($event)"
      [placeholder]="placeholder | translate"
      [disabled]="disabled"
      class="autocomplete-input"
      autocomplete="off"
    />
    
    <!-- Clear button -->
    <button
      *ngIf="searchText() && !disabled"
      type="button"
      class="clear-button"
      (click)="clearSelection()"
      [title]="'grid.clear' | translate"
    >
      ✕
    </button>
    
    <!-- Dropdown indicator -->
    <div class="dropdown-indicator" [class.open]="showDropdown()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
  
  <!-- Loading indicator -->
  <div *ngIf="loading()" class="loading-indicator">
    <div class="spinner"></div>
    <span>{{ 'grid.loading' | translate }}</span>
  </div>
  
  <!-- Dropdown menu -->
  <div class="autocomplete-dropdown" *ngIf="showDropdown() && !loading()">
    <div class="autocomplete-options" *ngIf="filteredOptions().length > 0">
      <div
        *ngFor="let option of filteredOptions(); let i = index"
        class="autocomplete-option"
        [class.highlighted]="highlightedIndex() === i"
        [class.selected]="selectedOption()?.id === option.id"
        (click)="selectOption(option)"
        (mouseenter)="highlightedIndex.set(i)"
      >
        <div class="option-content">
          <span class="option-name">{{ option.name }}</span>
          <svg 
            *ngIf="selectedOption()?.id === option.id"
            class="check-icon" 
            width="16" 
            height="16" 
            viewBox="0 0 16 16"
          >
            <path d="M13 4L6 11L3 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
    
    <!-- No results message -->
    <div class="no-results" *ngIf="filteredOptions().length === 0">
      <span>{{ 'grid.noResults' | translate }}</span>
    </div>
  </div>
</div>
